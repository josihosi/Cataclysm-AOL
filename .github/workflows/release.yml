name: "Experimental Release"

concurrency:
  group: release-${{ github.event.inputs.target_branch || github.ref_name }}
  cancel-in-progress: false

on:
  push:
    branches:
      - port/cdda-master
      - port/cdda-0.H
      - port/cdda-0.I
      - port/ctlg-master
    paths:
      - '.github/workflows/release.yml'
      - 'build-scripts/generate-release-notes.js'
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to build and release
        required: true
        type: choice
        options:
          - port/cdda-master
          - port/cdda-0.H
          - port/cdda-0.I
          - port/ctlg-master

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPOSITORY_NAME: ${{ github.event.repository.name }}
  TARGET_REF: ${{ github.event.inputs.target_branch || github.ref_name }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      timestamp: ${{ steps.get-timestamp.outputs.time }}
      target_ref: ${{ steps.metadata.outputs.target_ref }}
      branch_slug: ${{ steps.metadata.outputs.branch_slug }}
      branch_display: ${{ steps.metadata.outputs.branch_display }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      asset_prefix: ${{ steps.metadata.outputs.asset_prefix }}
      release_tag_prefix: ${{ steps.metadata.outputs.release_tag_prefix }}
    steps:
      - name: Get build timestamp
        id: get-timestamp
        run: |
          echo "time=$(/bin/date -u "+%Y-%m-%d-%H%M")" >> "$GITHUB_OUTPUT"

      - name: Generate release metadata
        id: metadata
        env:
          BUILD_TIME: ${{ steps.get-timestamp.outputs.time }}
        run: |
          set -eu
          branch="${TARGET_REF}"
          case "$branch" in
            port/cdda-master)
              branch_display="CDDA master port"
              branch_key="cdda-master"
              ;;
            port/cdda-0.H)
              branch_display="CDDA 0.H port"
              branch_key="cdda-0-h"
              ;;
            port/cdda-0.I)
              branch_display="CDDA 0.I port"
              branch_key="cdda-0-i"
              ;;
            port/ctlg-master)
              branch_display="CTLG master port"
              branch_key="ctlg-master"
              ;;
            *)
              echo "Unsupported target branch: $branch" >&2
              exit 1
              ;;
          esac

          tag_name="caol-${branch_key}-${BUILD_TIME}"
          release_name="Cataclysm: Arsenic and Old Lace ${branch_display} ${BUILD_TIME}"
          asset_prefix="caol_${branch_key}_${BUILD_TIME}"
          release_tag_prefix="caol-${branch_key}-"

          {
            echo "target_ref=$branch"
            echo "branch_slug=$branch_key"
            echo "branch_display=$branch_display"
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "asset_prefix=$asset_prefix"
            echo "release_tag_prefix=$release_tag_prefix"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.metadata.outputs.target_ref }}
          fetch-tags: true
          persist-credentials: false

      - name: Generate release notes
        id: generate-release-notes
        run: |
          set -eu
          npm install @actions/github@8
          node build-scripts/generate-release-notes.js \
            '${{ secrets.GITHUB_TOKEN }}' \
            '${{ steps.metadata.outputs.tag_name }}' \
            "$(git log -1 --format='%H')" \
            '${{ steps.metadata.outputs.release_tag_prefix }}' \
            '${{ steps.metadata.outputs.target_ref }}' \
            > auto-notes.txt

          {
            printf '# %s\n\n' '${{ steps.metadata.outputs.release_name }}'
            printf -- '- target branch: `%s`\n' '${{ steps.metadata.outputs.target_ref }}'
            printf -- '- commit: `%s`\n' "$(git rev-parse --short HEAD)"
            printf -- '- built at: `%s` UTC\n\n' '${{ steps.get-timestamp.outputs.time }}'
            cat auto-notes.txt
          } > notes.txt

      - name: Create or reuse GitHub release
        run: |
          set -eu
          if gh release view '${{ steps.metadata.outputs.tag_name }}' >/dev/null 2>&1; then
            echo "Release ${{ steps.metadata.outputs.tag_name }} already exists, reusing it."
          else
            gh release create '${{ steps.metadata.outputs.tag_name }}' \
              --notes-file notes.txt \
              --prerelease \
              --title '${{ steps.metadata.outputs.release_name }}' \
              --target "$(git log -1 --format='%H')"
          fi

  compose-tilesets:
    uses: ./.github/workflows/compose-tilesets.yml
    with:
      target_ref: ${{ github.event.inputs.target_branch || github.ref_name }}
  build-translations:
    uses: ./.github/workflows/build-translations.yml
    with:
      target_ref: ${{ github.event.inputs.target_branch || github.ref_name }}
    secrets:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}

  builds:
    needs:
      - release
      - compose-tilesets
      - build-translations
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 Tiles + Sound
            release_os: windows
            os: windows-2022
            ext: zip
            content: application/zip
            arch: x64
            tiles: 1
            sound: 1
          - name: Linux x64 Tiles + Sound
            release_os: linux
            os: ubuntu-24.04
            ext: tar.gz
            content: application/gzip
            android: none
            libbacktrace: 1
            tiles: 1
            sound: 1
          - name: macOS universal Tiles + Sound
            release_os: macos
            os: macos-15
            ext: dmg
            content: application/x-apple-diskimage
            tiles: 1
            sound: 1
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions: write-all
    env:
      ZSTD_CLEVEL: 17
    steps:
      - name: Maximize build space (mac)
        if: ${{ runner.os == 'macOS' }}
        run: |
          sudo rm -rf "$ANDROID_HOME"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release.outputs.target_ref }}
          fetch-tags: true
          persist-credentials: false

      - name: Get soundpack
        if: matrix.sound == 1
        run: |
          git clone --depth=1 --shallow-submodules --recurse-submodules https://github.com/Fris0uman/CDDA-Soundpacks '${{ github.workspace }}/CDDA-Soundpacks'
          mv '${{ github.workspace }}/CDDA-Soundpacks/sound/CC-Sounds' '${{ github.workspace }}/data/sound'

      - name: Fetch tileset artifact into build
        if: matrix.tiles == 1
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: tileset-*
          path: gfx
          merge-multiple: true

      - name: Fetch translations artifact into build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: translations

      - name: Install dependencies (windows msvc) (1/4)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Install dependencies (windows msvc) (2/4)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@7d259227a1fb6471a0253dd5ab7419835228f7d7 # v11
        id: runvcpkg
        with:
          vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
          vcpkgGitCommitId: '1b6e030cf096faf4f82d7b7025de8b2abee3e3df'

      - name: Install dependencies (windows msvc) (3/4)
        if: runner.os == 'Windows'
        run: |
          vcpkg integrate install --vcpkg-root '${{ runner.workspace }}\b\vcpkg'

      - name: Install dependencies (windows msvc) (4/4)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda # v2
        with:
          msystem: mingw64
          install: >-
            gettext
            make

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && matrix.android == 'none'
        run: |
          sudo apt-get update
          sudo apt-get install libsdl2-dev
          git clone https://github.com/libsdl-org/SDL.git --branch release-2.0.20 --depth 1
          cd SDL
          mkdir build
          cd build
          ../configure
          make -j$((`nproc`+0))
          sudo make install
          cp ../LICENSE.txt ${{ github.workspace }}/LICENSE-SDL.txt
          sudo apt-get install libncursesw5-dev libsdl2-ttf-dev libsdl2-image-dev \
            libsdl2-mixer-dev libpulse-dev ccache gettext parallel

      - name: Install runtime dependencies (mac)
        if: runner.os == 'macOS'
        uses: BrettDong/setup-sdl2-frameworks@a8ca795ef904417e9ddcb010ef6bf2d11779dbe3 # v2
        with:
          sdl2: 2.30.11
          sdl2-ttf: 2.24.0
          sdl2-image: 2.8.4
          sdl2-mixer: 2.8.0

      - name: Install build dependencies (mac)
        if: runner.os == 'macOS'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=yes HOMEBREW_NO_INSTALL_CLEANUP=yes brew install gettext ccache parallel dylibbundler
          pip3 install --break-system-packages dmgbuild biplist

      - name: Install macports (mac)
        if: runner.os == 'macOS' && matrix.tiles == 1
        uses: melusina-org/setup-macports@c7eb59386def259a274627092566a7f7b8d219b1 # v1

      - name: Install macports packages (mac)
        if: runner.os == 'macOS' && matrix.tiles == 1
        run: |
          sudo port install freetype +universal pkgconfig +universal

      - name: Create VERSION.txt
        shell: bash
        run: |
          commit_sha="$(git rev-parse HEAD)"
          cat > VERSION.txt <<EOL
          build type: ${{ matrix.release_os }}
          build number: ${{ needs.release.outputs.timestamp }}
          target branch: ${{ needs.release.outputs.target_ref }}
          commit sha: ${commit_sha}
          commit url: https://github.com/${{ github.repository }}/commit/${commit_sha}
          EOL

      - name: Compile translations (windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          lang/compile_mo.sh all

      - name: Build libbacktrace
        if: matrix.libbacktrace == 1
        run: |
          git clone https://github.com/ianlancetaylor/libbacktrace.git
          cd libbacktrace
          git checkout 14818b7783eeb9a56c3f0fca78cefd3143f8c5f6
          ./configure
          make -j$((`nproc`+0))
          cp LICENSE ${{ github.workspace }}/LICENSE-libbacktrace.txt
          sudo make install

      - name: Build CDDA (linux)
        if: runner.os == 'Linux' && matrix.android == 'none'
        run: |
          make COMPILER=clang++-18 -j$((`nproc`+0)) TILES=${{ matrix.tiles }} SOUND=${{ matrix.sound }} RELEASE=1 LOCALIZE=1 LANGUAGES=all BACKTRACE=1 LIBBACKTRACE=${{ matrix.libbacktrace }} WARN_STALE_DATA=1 PCH=0 bindist
          mv cataclysmdda-0.J.tar.gz ${{ needs.release.outputs.asset_prefix }}_${{ matrix.release_os }}.${{ matrix.ext }}

      - name: Build CDDA (windows msvc)
        if: runner.os == 'Windows'
        env:
          BACKTRACE: 1
          CDDA_RELEASE_BUILD: 1
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\.github\vcpkg_triplets
        run: |
          msbuild -m -p:Configuration=Release -p:Platform=${{ matrix.arch }} "-target:Cataclysm-vcpkg-static;JsonFormatter-vcpkg-static;zzip" msvc-full-features\Cataclysm-vcpkg-static.sln
          .\build-scripts\windist.ps1
          mv cataclysmdda-0.J.zip ${{ needs.release.outputs.asset_prefix }}_${{ matrix.release_os }}.${{ matrix.ext }}

      - name: Build CDDA (osx)
        if: runner.os == 'macOS'
        run: |
          make -j3 TILES=${{ matrix.tiles }} SOUND=${{ matrix.sound }} RELEASE=1 LOCALIZE=1 LANGUAGES=all BACKTRACE=0 PCH=0 USE_HOME_DIR=1 FRAMEWORK=1 UNIVERSAL_BINARY=1 WARN_STALE_DATA=1 dmgdist
          mv Cataclysm.dmg ${{ needs.release.outputs.asset_prefix }}_${{ matrix.release_os }}.${{ matrix.ext }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.release_os }}
          path: ${{ needs.release.outputs.asset_prefix }}_${{ matrix.release_os }}.${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload release asset
        run: |
          gh release upload '${{ needs.release.outputs.tag_name }}' \
            '${{ needs.release.outputs.asset_prefix }}_${{ matrix.release_os }}.${{ matrix.ext }}' \
            --clobber

  checksums:
    name: Publish SHA256SUMS
    needs:
      - release
      - builds
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksum file
        run: |
          set -eu
          cd dist
          shasum -a 256 * > SHA256SUMS.txt

      - name: Upload checksum asset
        run: |
          gh release upload '${{ needs.release.outputs.tag_name }}' dist/SHA256SUMS.txt --clobber
