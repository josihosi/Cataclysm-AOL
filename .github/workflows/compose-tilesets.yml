name: Build tilesets
on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to use for local repo checkout
        required: false
        default: master
        type: string
  workflow_call:
    inputs:
      target_ref:
        required: false
        type: string
        default: master

jobs:
  formatter:
    name: Build json formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout local repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.target_ref }}
          sparse-checkout: |
            src
            tools
          fetch-depth: 1
          persist-credentials: false

      - name: Build json formatter
        run: make tools/format/json_formatter.cgi

      - name: Save formatter and compose into cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            tools/format
            tools/gfx_tools
          key: tools-${{ github.run_id }}

  builds:
    needs: formatter
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Altica
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/Altica
            compose_args: --use-all --obsolete-fillers
            tileset_src_checkout: "gfx"
          - name: ASCII_Overmap
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/ASCII_Overmap
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: BrownLikeBears
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/BrownLikeBears
            compose_args: --use-all --obsolete-fillers
            tileset_src_checkout: "gfx"
          - name: ChibiUltica
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/Chibi_Ultica
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: HollowMoon
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/HollowMoon
            compose_args: --use-all --obsolete-fillers
            tileset_src_checkout: "gfx"
          - name: Larwick_Overmap
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/Larwick_Overmap
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: MShockXotto+
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/MShockXotto+
            compose_args: --use-all
            tileset_src_checkout: "gfx"
            ctlg_strip_flagpole: true
          - name: NeoDays
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/NeoDays
            compose_args: --use-all
            tileset_src_checkout: "gfx"
            skip_on_ctlg: true
          - name: Retrodays
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/Retrodays
            compose_args: --use-all
            tileset_src_checkout: "gfx"
            skip_on_ctlg: true
          - name: GiantDays
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/GiantDays
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: SmashButton_iso
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/HitButton_iso
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: SurveyorsMap
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/SurveyorsMap
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: UltimateCataclysm
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/UltimateCataclysm
            compose_args: --use-all --obsolete-fillers
            tileset_src_checkout: "gfx"
          - name: Ultica_iso
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/Ultica_iso
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: PenAndPaper
            tileset_repo: I-am-Erk/CDDA-Tilesets
            tileset_dir: gfx/PenAndPaper
            compose_args: --use-all
            tileset_src_checkout: "gfx"
          - name: Cuteclysm
            tileset_dir: "."
            compose_args: --use-all
            tileset_repo: pixel-32/CDDA-tileset
            tileset_src_checkout: ""

    name: Compose tileset
    runs-on: ubuntu-latest
    steps:
      - name: Restore tools into workspace from cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            tools/format
            tools/gfx_tools
          key: tools-${{ github.run_id }}

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # v1
        with:
          packages: python3 python3-pip libvips42
      - run: pip install pyvips

      - name: Skip duplicate built-in CTLG tileset
        if: ${{ inputs.target_ref == 'port/ctlg-master' && matrix.skip_on_ctlg }}
        run: echo "Skipping ${{ matrix.name }} because CTLG already ships that tileset under a built-in directory."

      - name: Clone tileset repo
        if: ${{ !(inputs.target_ref == 'port/ctlg-master' && matrix.skip_on_ctlg) }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ matrix.tileset_repo }}
          ref: master
          path: build-tilesets
          sparse-checkout: ${{matrix.tileset_src_checkout}}
          fetch-depth: 1
          persist-credentials: false

      - name: Build ${{ matrix.name }}
        if: ${{ !(inputs.target_ref == 'port/ctlg-master' && matrix.skip_on_ctlg) }}
        run: |
          export SOURCE="${{github.workspace}}/build-tilesets/${{ matrix.tileset_dir }}"
          export DEST="${{github.workspace}}/gfx/${{ matrix.name }}"
          python3 ${{ github.workspace }}/tools/gfx_tools/compose.py ${{ matrix.compose_args }} --feedback CONCISE --format-json --loglevel INFO "$SOURCE" "$DEST"

          mv -v "$SOURCE/tileset.txt" "$DEST/"
          [ -f "$SOURCE/fallback.png"  ] && mv -v "$SOURCE/fallback.png" "$DEST/" || echo "No fallback.png for ${{ matrix.name }}"
          [ -f "$SOURCE/layering.json" ] && mv -v "$SOURCE/layering.json" "$DEST/" || echo "No layering.json for ${{ matrix.name }}"

      - name: Clean CTLG-only tileset warnings
        if: ${{ inputs.target_ref == 'port/ctlg-master' && matrix.ctlg_strip_flagpole }}
        run: |
          python3 - <<'PY2'
          import json
          from pathlib import Path
          base = Path('${{ github.workspace }}') / 'gfx' / '${{ matrix.name }}'
          layering = base / 'layering.json'
          if layering.exists():
              data = json.loads(layering.read_text())
              data['variants'] = [v for v in data.get('variants', []) if v.get('context') != 'f_indoor_flagpole_wooden']
              layering.write_text(json.dumps(data, indent=2) + '\n')
          tile_config = base / 'tile_config.json'
          if tile_config.exists():
              data = json.loads(tile_config.read_text())
              tiles = data.get('tiles-new', [])
              for entry in tiles:
                  if isinstance(entry, dict) and isinstance(entry.get('tiles'), list):
                      entry['tiles'] = [t for t in entry['tiles'] if not (isinstance(t, dict) and t.get('id') == 'f_indoor_flagpole_wooden')]
              tile_config.write_text(json.dumps(data, indent=2) + '\n')
          PY2

      - name: Store artifact
        if: ${{ !(inputs.target_ref == 'port/ctlg-master' && matrix.skip_on_ctlg) }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "tileset-${{ matrix.name }}"
          path: "${{github.workspace}}/gfx/*"
